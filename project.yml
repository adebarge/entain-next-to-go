name: Entain
options:
  bundleIdPrefix: com.entain
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Debug
  xcodeVersion: "18.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Model:
    path: Packages/Model
  Services:
    path: Packages/Services
  ViewModels:
    path: Packages/ViewModels
  UI:
    path: Packages/UI
  SwiftLint:
    url: https://github.com/realm/SwiftLint
    from: "0.57.0"

targets:
  Entain:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Entain
    resources:
      - path: Entain/Assets.xcassets
      - path: Entain/Settings.bundle
    info:
      path: Entain/Info.plist
      properties:
        CFBundleDisplayName: "Next to Go"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    dependencies:
      - package: Model
        product: Model
      - package: UI
        product: UI
      - package: Services
        product: Services
      - package: ViewModels
        product: ViewModels
    preBuildScripts:
      - name: SwiftLint
        script: |
          export PATH="$PATH:/opt/homebrew/bin"
          if which swiftlint > /dev/null; then
            swiftlint --config "${SRCROOT}/.swiftlint.yml"
          else
            echo "warning: SwiftLint not installed. Install via: brew install swiftlint"
          fi
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.entain.NextToGo
        PRODUCT_NAME: Entain
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        DEVELOPMENT_ASSET_PATHS: ""
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
      Debug:
        DEBUG_INFORMATION_FORMAT: dwarf
      Release:
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        SWIFT_OPTIMIZATION_LEVEL: "-O"
  EntainTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: EntainTests
      - path: Packages/ViewModels/Tests/ViewModelsTests
      - path: Packages/Services/Tests/ServicesTests
    dependencies:
      - target: Entain
      - package: ViewModels
        product: ViewModels
      - package: Model
        product: Model
      - package: Services
        product: Services
      - package: UI
        product: UI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Entain:
    build:
      targets:
        Entain: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: EntainTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
